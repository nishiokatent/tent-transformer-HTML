<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tent Simulator</title>

<style>
body{
font-family:sans-serif;
text-align:center;
}

canvas{
border:1px solid #aaa;
max-width:95%;
touch-action:none;
}

button{
margin:5px;
padding:8px 12px;
}
</style>
</head>

<body>

<h2>テント張替えシミュレーター（TEST）</h2>

<input type="file" id="upload"><br><br>

<select id="fabricSelect">
<option>生地読み込み中...</option>
</select>

<br><br>

<button onclick="undoPoint()">1点戻す</button>
<button onclick="clearPolygon()">囲い削除</button>
<button onclick="finishPolygon()">囲み完了</button>

<br><br>

<canvas id="canvas"></canvas>

<script>

const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQyMy5PUSJjr1f_fnQIpRIUagAp8Dw7Hqckr9422w_459qgQ_j4Bhw4LWygLVWTURa9n4Xl_gBNHAie/pub?output=csv"

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let originalImage=null
let points=[]
let maskPath=null

let draggingPoint=-1

//CSV読み込み

fetch(csvURL)
.then(res=>res.text())
.then(text=>{

const rows=text.split("\n").slice(1)

const select=document.getElementById("fabricSelect")

select.innerHTML=""

rows.forEach(row=>{

if(!row.trim())return

const cols=row.split(",")

const name=cols[0]
const r=cols[1]
const g=cols[2]
const b=cols[3]

const option=document.createElement("option")

option.textContent=name
option.value=`${r},${g},${b}`

select.appendChild(option)

})

})

//画像アップ

document.getElementById("upload").onchange=e=>{

const file=e.target.files[0]

const img=new Image()

img.onload=()=>{

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

originalImage=img

points=[]
maskPath=null

}

img.src=URL.createObjectURL(file)

}

//座標取得

function getMousePos(e){

const rect=canvas.getBoundingClientRect()

return{
x:(e.clientX-rect.left)*(canvas.width/rect.width),
y:(e.clientY-rect.top)*(canvas.height/rect.height)
}

}

//近い点

function findPoint(pos){

for(let i=0;i<points.length;i++){

const dx=points[i].x-pos.x
const dy=points[i].y-pos.y

if(Math.sqrt(dx*dx+dy*dy)<20){

return i

}

}

return -1

}

//pointer down

canvas.addEventListener("pointerdown",e=>{

if(!originalImage)return

const pos=getMousePos(e)

const hit=findPoint(pos)

if(hit>=0){

draggingPoint=hit

}else{

points.push(pos)

draw()

}

})

//pointer move

canvas.addEventListener("pointermove",e=>{

if(draggingPoint<0)return

const pos=getMousePos(e)

points[draggingPoint]=pos

draw()

})

//pointer up

canvas.addEventListener("pointerup",()=>{

draggingPoint=-1

})

//再描画

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(originalImage){
ctx.drawImage(originalImage,0,0)
}

if(points.length===0)return

ctx.beginPath()

ctx.moveTo(points[0].x,points[0].y)

for(let i=1;i<points.length;i++){
ctx.lineTo(points[i].x,points[i].y)
}

ctx.strokeStyle="red"
ctx.lineWidth=3
ctx.stroke()

for(let p of points){

ctx.beginPath()
ctx.arc(p.x,p.y,6,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()

}

}

//囲み確定

function finishPolygon(){

if(points.length<3)return

maskPath=new Path2D()

maskPath.moveTo(points[0].x,points[0].y)

for(let i=1;i<points.length;i++){
maskPath.lineTo(points[i].x,points[i].y)
}

maskPath.closePath()

applyFabric()

}

//生地変更

document.getElementById("fabricSelect").onchange=applyFabric

function applyFabric(){

if(!maskPath)return

const val=document.getElementById("fabricSelect").value

const cols=val.split(",")

const r=cols[0]
const g=cols[1]
const b=cols[2]

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(originalImage,0,0)

ctx.save()

ctx.clip(maskPath)

ctx.globalCompositeOperation="multiply"

ctx.fillStyle=`rgb(${r},${g},${b})`

ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.restore()

}

//1点戻す

function undoPoint(){

if(points.length===0)return

points.pop()

draw()

}

//囲い削除

function clearPolygon(){

points=[]
maskPath=null

ctx.clearRect(0,0,canvas.width,canvas.height)

if(originalImage){
ctx.drawImage(originalImage,0,0)
}

}

</script>

</body>
</html>
