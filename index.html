<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Tent Simulator AI Pro</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    padding: 10px;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

canvas {
    border: 1px solid #aaa;
    max-width: 95%;
    touch-action: none;
    cursor: crosshair;
    background-color: #f8f8f8;
    -webkit-touch-callout: none;
}

button {
    margin: 3px;
    padding: 10px 14px;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
    background: #fff;
    /* スタイル解除の標準化 */
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
}

#status {
    color: #444;
    font-size: 0.85em;
    margin-bottom: 10px;
    padding: 8px;
    background: #f0f0f0;
    border-radius: 4px;
    min-height: 1.5em;
}

#saveArea img {
    border: 3px solid #ddd;
    margin-top: 15px;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
</head>
<body>

<h2>テント張替え AIシミュレーター</h2>
<div id="status">AIエンジン初期化中...</div>

<input type="file" id="upload" accept="image/*"><br><br>

<select id="fabricSelect">
    <option>生地をロード中...</option>
</select>

<br><br>
<button onclick="undoPoint()">1点戻す</button>
<button onclick="clearPolygon()">全リセット</button>
<button onclick="finishPolygon()">手動囲み完了</button>
<button onclick="saveImage()">画像保存</button>

<br><br>
<canvas id="canvas"></canvas>
<div id="saveArea"></div>

<script>
let interactiveSegmenter;
const statusDiv = document.getElementById("status");

async function initAI() {
    try {
        const vision = await mediapipe.tasksVision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        interactiveSegmenter = await mediapipe.tasksVision.InteractiveSegmenter.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/interactive_segmenter/magic_touch/float16/1/magic_touch.tflite`,
                delegate: "GPU"
            },
            outputCategoryMask: true,
            outputConfidenceMasks: false
        });
        statusDiv.textContent = "✅ AI準備完了：テントをタップして下さい";
    } catch (e) {
        statusDiv.innerHTML = "<b style='color:red;'>⚠️ AI起動エラー: ページを再読み込みしてください</b>";
        console.error("AI Init Error:", e);
    }
}
window.onload = initAI;

const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQyMy5PUSJjr1f_fnQIpRIUagAp8Dw7Hqckr9422w_459qgQ_j4Bhw4LWygLVWTURa9n4Xl_gBNHAie/pub?output=csv";
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let originalImage = null, points = [], maskPath = null;
let scale = 1, offsetX = 0, offsetY = 0;
let pointers = [], lastDistance = 0, lastPanX = 0, lastPanY = 0;
let downX = 0, downY = 0, moved = false, pinchUsed = false, needsRedraw = true;

function renderLoop() {
    if (needsRedraw) { draw(); needsRedraw = false; }
    requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

fetch(csvURL).then(res => res.text()).then(text => {
    const rows = text.trim().split("\n").slice(1);
    const select = document.getElementById("fabricSelect");
    select.innerHTML = "";
    rows.forEach(row => {
        if (!row.trim()) return;
        const cols = row.split(",");
        const opt = document.createElement("option");
        opt.textContent = `${cols[0]} ${cols[1]} ${cols[2]} ${cols[3]}`;
        opt.value = (cols[4] && cols[5] && cols[6]) ? `${cols[4]},${cols[5]},${cols[6]}` : "";
        select.appendChild(opt);
    });
});

document.getElementById("upload").onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const img = new Image();
    img.crossOrigin = "anonymous"; // AI解析のための権限設定
    img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;
        scale = 1; offsetX = 0; offsetY = 0;
        originalImage = img; points = []; maskPath = null;
        needsRedraw = true;
    };
    img.src = URL.createObjectURL(file);
};

function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    return { x: (x - offsetX) / scale, y: (y - offsetY) / scale };
}

async function runAISegmentation(targetX, targetY) {
    if (!interactiveSegmenter || !originalImage) return;
    statusDiv.textContent = "⏳ 解析中...";
    points = []; maskPath = null;

    try {
        const result = interactiveSegmenter.segment(originalImage, {
            keypoint: { x: targetX / canvas.width, y: targetY / canvas.height }
        });
        const mask = result.categoryMask.getAsUint8Array();
        processMask(mask);
    } catch (err) {
        statusDiv.textContent = "❌ 解析エラーが発生しました";
    }
}

function processMask(maskData) {
    const mCanvas = document.createElement("canvas");
    mCanvas.width = canvas.width;
    mCanvas.height = canvas.height;
    const mCtx = mCanvas.getContext("2d");
    const mImgData = mCtx.createImageData(canvas.width, canvas.height);
    let hasData = false;
    for (let i = 0; i < maskData.length; i++) {
        if (maskData[i] > 0) {
            mImgData.data[i * 4] = 255;
            mImgData.data[i * 4 + 3] = 255;
            hasData = true;
        }
    }
    mCtx.putImageData(mImgData, 0, 0);
    if(hasData) {
        maskPath = new Path2D(mCanvas);
        statusDiv.textContent = "✅ 抽出成功";
    } else {
        statusDiv.textContent = "❌ 範囲が見つかりませんでした";
    }
    needsRedraw = true;
}

window.addEventListener('contextmenu', e => { if (e.target.tagName === 'CANVAS') e.preventDefault(); }, false);

canvas.addEventListener("pointerdown", e => {
    if(e.pointerType === 'touch') e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    pointers.push(e);
    lastPanX = e.clientX; lastPanY = e.clientY;
    downX = e.clientX; downY = e.clientY;
    moved = false; pinchUsed = false;
});

canvas.addEventListener("pointermove", e => {
    for(let i=0; i<pointers.length; i++){ if(pointers[i].pointerId === e.pointerId) pointers[i] = e; }
    if(pointers.length === 2) {
        pinchUsed = true;
        const p1 = pointers[0], p2 = pointers[1];
        const rect = canvas.getBoundingClientRect();
        const centerX = (p1.clientX + p2.clientX) / 2;
        const centerY = (p1.clientY + p2.clientY) / 2;
        const canvasX = (centerX - rect.left) * (canvas.width / rect.width);
        const canvasY = (centerY - rect.top) * (canvas.height / rect.height);
        const distance = Math.sqrt(Math.pow(p1.clientX - p2.clientX, 2) + Math.pow(p1.clientY - p2.clientY, 2));
        if(lastDistance) {
            const zoom = distance / lastDistance;
            offsetX = canvasX - (canvasX - offsetX) * zoom;
            offsetY = canvasY - (canvasY - offsetY) * zoom;
            scale *= zoom;
            needsRedraw = true;
        }
        lastDistance = distance;
    } else if(pointers.length === 1) {
        const dx = e.clientX - lastPanX, dy = e.clientY - lastPanY;
        offsetX += dx; offsetY += dy;
        if(Math.abs(e.clientX - downX) > 8 || Math.abs(e.clientY - downY) > 8) moved = true;
        lastPanX = e.clientX; lastPanY = e.clientY;
        needsRedraw = true;
    }
});

canvas.addEventListener("pointerup", e => {
    pointers = pointers.filter(p => p.pointerId !== e.pointerId);
    lastDistance = 0;
    if(!moved && !pinchUsed) {
        const pos = getMousePos(e);
        if(interactiveSegmenter) runAISegmentation(pos.x, pos.y);
        else points.push(pos);
        needsRedraw = true;
    }
});

function draw() {
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);
    if(originalImage) ctx.drawImage(originalImage, 0, 0);
    if(maskPath) {
        applyFabric();
    } else if(points.length > 0) {
        ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
        for(let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.strokeStyle = "red"; ctx.lineWidth = 3/scale; ctx.stroke();
        for(let p of points) {
            ctx.beginPath(); ctx.arc(p.x, p.y, 6/scale, 0, Math.PI*2);
            ctx.fillStyle = "red"; ctx.fill();
        }
    }
}

function applyFabric() {
    if(!maskPath) return;
    const val = document.getElementById("fabricSelect").value;
    if(!val) return;
    const rgb = val.split(",");
    ctx.save();
    ctx.clip(maskPath);
    ctx.globalCompositeOperation = "multiply";
    ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
}

function finishPolygon() {
    if(points.length < 3) return;
    maskPath = new Path2D();
    maskPath.moveTo(points[0].x, points[0].y);
    for(let i=1; i<points.length; i++) maskPath.lineTo(points[i].x, points[i].y);
    maskPath.closePath();
    points = []; needsRedraw = true;
}
document.getElementById("fabricSelect").onchange = () => { needsRedraw = true; };
function undoPoint() { points.pop(); needsRedraw = true; }
function clearPolygon() { points = []; maskPath = null; statusDiv.textContent = "✅ AI準備完了"; needsRedraw = true; }

function saveImage() {
    if(!originalImage) return;
    const out = document.createElement("canvas");
    out.width = canvas.width; out.height = canvas.height;
    const octx = out.getContext("2d");
    octx.drawImage(originalImage, 0, 0);
    if(maskPath) {
        const rgb = document.getElementById("fabricSelect").value.split(",");
        octx.save(); octx.clip(maskPath);
        octx.globalCompositeOperation = "multiply";
        octx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        octx.fillRect(0, 0, out.width, out.height);
        octx.restore();
    }
    const url = out.toDataURL("image/png");
    const area = document.getElementById("saveArea");
    area.innerHTML = "<h4>↓ 画像を長押しして保存</h4>";
    const img = new Image(); img.src = url; img.style.width = "90%";
    area.appendChild(img);
}
</script>
</body>
</html>
