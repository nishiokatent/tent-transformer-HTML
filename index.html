<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Tent AI Simulator</title>
<style>
body{ font-family:sans-serif; text-align:center; margin:0; padding:20px; background:#f4f4f4; }
canvas{ 
    border:2px solid #333; 
    max-width:100%; 
    background:#fff;
    touch-action:none; 
    cursor: crosshair;
    -webkit-touch-callout: none; /* iPhone長押しメニュー禁止 */
    -webkit-user-select: none;
    user-select: none;
}
button{ margin:5px; padding:10px 15px; border-radius:5px; border:1px solid #ccc; background:#fff; }
#status { background:#333; color:#fff; padding:5px; font-size:12px; margin-bottom:10px; border-radius:4px; min-height:1.2em;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
</head>
<body>

<h2>テント張替えシミュレーター AI</h2>
<div id="status">AIシステム起動中...</div>

<input type="file" id="upload" accept="image/*"><br><br>

<select id="fabricSelect">
<option>生地読み込み中...</option>
</select>

<br><br>
<button onclick="undoPoint()">1点戻す</button>
<button onclick="clearPolygon()">全削除</button>
<button onclick="finishPolygon()">囲み完了</button>
<button onclick="saveImage()">画像保存</button>

<br><br>
<canvas id="canvas"></canvas>
<div id="saveArea"></div>

<script>
/* =========================
   AI初期化
========================= */
let interactiveSegmenter;
const statusDiv = document.getElementById("status");

async function initAI() {
    try {
        const vision = await mediapipe.tasksVision.FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );
        interactiveSegmenter = await mediapipe.tasksVision.InteractiveSegmenter.createFromOptions(vision, {
            baseOptions: {
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/interactive_segmenter/magic_touch/float16/1/magic_touch.tflite`,
                delegate: "GPU"
            },
            outputCategoryMask: true,
            outputConfidenceMasks: false
        });
        statusDiv.textContent = "✅ AI準備完了：テントをタップ（長押し）";
    } catch (e) {
        statusDiv.textContent = "❌ AI起動失敗: HTTPS接続を確認してください";
        console.error(e);
    }
}
initAI();

/* =========================
   基本設定
========================= */
const csvURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQyMy5PUSJjr1f_fnQIpRIUagAp8Dw7Hqckr9422w_459qgQ_j4Bhw4LWygLVWTURa9n4Xl_gBNHAie/pub?output=csv"
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let originalImage=null, points=[], maskPath=null, scale=1, offsetX=0, offsetY=0;
let pointers=[], lastDistance=0, lastPanX=0, lastPanY=0, downX=0, downY=0;
let moved=false, pinchUsed=false, needsRedraw=true;
let pressTimer; // 長押し用

function renderLoop(){
    if(needsRedraw){ draw(); needsRedraw=false; }
    requestAnimationFrame(renderLoop)
}
requestAnimationFrame(renderLoop)

/* CSV読み込み */
fetch(csvURL).then(res=>res.text()).then(text=>{
    const rows=text.trim().split("\n").slice(1)
    const select=document.getElementById("fabricSelect")
    select.innerHTML=""
    rows.forEach(row=>{
        const cols=row.split(",");
        const option=document.createElement("option")
        option.textContent=`${cols[0]} ${cols[1]} ${cols[2]} ${cols[3]}`;
        option.value= (cols[4] && cols[5] && cols[6]) ? `${cols[4]},${cols[5]},${cols[6]}` : "";
        select.appendChild(option)
    })
})

/* 画像アップ */
document.getElementById("upload").onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const img=new Image();
    img.onload=()=>{
        canvas.width=img.width; canvas.height=img.height;
        scale=1; offsetX=0; offsetY=0;
        originalImage=img; points=[]; maskPath=null;
        needsRedraw=true;
    }
    img.src=URL.createObjectURL(file)
}

function getMousePos(e){
    const rect=canvas.getBoundingClientRect();
    const x=(e.clientX-rect.left)*(canvas.width/rect.width);
    const y=(e.clientY-rect.top)*(canvas.height/rect.height);
    return { x:(x-offsetX)/scale, y:(y-offsetY)/scale };
}

/* AIセグメンテーション */
async function runAI(x, y) {
    if (!interactiveSegmenter || !originalImage) return;
    statusDiv.textContent = "⏳ 解析中...";
    points = []; // 既存のドットを消す
    
    try {
        const result = await interactiveSegmenter.segment(originalImage, {
            keypoint: { x: x / canvas.width, y: y / canvas.height }
        });
        const mask = result.categoryMask.getAsUint8Array();
        processMask(mask);
    } catch(err) {
        statusDiv.textContent = "⚠️ 解析エラー";
    }
}

function processMask(maskData) {
    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
    const tCtx = tempCanvas.getContext("2d");
    const tImgData = tCtx.createImageData(canvas.width, canvas.height);
    for (let i = 0; i < maskData.length; i++) {
        if (maskData[i] > 0) { tImgData.data[i*4]=255; tImgData.data[i*4+3]=255; }
    }
    tCtx.putImageData(tImgData, 0, 0);
    maskPath = new Path2D(tempCanvas);
    statusDiv.textContent = "✅ 抽出完了";
    needsRedraw = true;
}

/* 操作イベント */
canvas.addEventListener("pointerdown", e => {
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    pointers.push(e);
    downX=e.clientX; downY=e.clientY;
    lastPanX=e.clientX; lastPanY=e.clientY;
    moved=false; pinchUsed=false;

    // 長押しタイマー（0.6秒以上でAI発火）
    clearTimeout(pressTimer);
    pressTimer = setTimeout(() => {
        if(!moved && !pinchUsed) {
            const pos = getMousePos(e);
            runAI(pos.x, pos.y);
            pinchUsed = true; // AIが動いたら通常の点打ちをさせない
        }
    }, 600);
});

canvas.addEventListener("pointermove", e => {
    for(let i=0;i<pointers.length;i++){ if(pointers[i].pointerId===e.pointerId) pointers[i]=e; }
    if(pointers.length===1){
        const dx=e.clientX-lastPanX; const dy=e.clientY-lastPanY;
        offsetX+=dx; offsetY+=dy;
        if(Math.abs(e.clientX-downX)>10 || Math.abs(e.clientY-downY)>10) {
            moved=true;
            clearTimeout(pressTimer);
        }
        lastPanX=e.clientX; lastPanY=e.clientY;
        needsRedraw=true;
    }
    if(pointers.length===2){
        pinchUsed=true; clearTimeout(pressTimer);
        const p1=pointers[0], p2=pointers[1];
        const rect=canvas.getBoundingClientRect();
        const centerX=(p1.clientX+p2.clientX)/2-rect.left;
        const centerY=(p1.clientY+p2.clientY)/2-rect.top;
        const dx=p1.clientX-p2.clientX, dy=p1.clientY-p2.clientY;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(lastDistance){
            const zoom=dist/lastDistance;
            scale*=zoom;
            needsRedraw=true;
        }
        lastDistance=dist;
    }
});

canvas.addEventListener("pointerup", e => {
    clearTimeout(pressTimer);
    if(!moved && !pinchUsed && pointers.length === 1){
        const pos = getMousePos(e);
        points.push(pos); // 短いタップならドットを打つ
        needsRedraw = true;
    }
    pointers=pointers.filter(p=>p.pointerId!==e.pointerId);
    lastDistance=0;
});

function draw(){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
    if(originalImage) ctx.drawImage(originalImage,0,0);
    if(maskPath) { applyFabric(); return; }
    if(points.length===0) return;
    ctx.beginPath(); ctx.moveTo(points[0].x,points[0].y);
    for(let i=1;i<points.length;i++) ctx.lineTo(points[i].x,points[i].y);
    ctx.strokeStyle="red"; ctx.lineWidth=3/scale; ctx.stroke();
    for(let p of points){
        ctx.beginPath(); ctx.arc(p.x,p.y,6/scale,0,Math.PI*2);
        ctx.fillStyle="red"; ctx.fill();
    }
}

function applyFabric(){
    if(!maskPath)return;
    const val=document.getElementById("fabricSelect").value;
    if(!val) return;
    const rgb=val.split(",");
    ctx.save();
    ctx.clip(maskPath);
    ctx.globalCompositeOperation="multiply";
    ctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.restore();
}

function undoPoint(){ points.pop(); needsRedraw=true; }
function clearPolygon(){ points=[]; maskPath=null; statusDiv.textContent="✅ リセット完了"; needsRedraw=true; }

function saveImage(){
    if(!originalImage) return;
    const exp = document.createElement("canvas");
    exp.width=canvas.width; exp.height=canvas.height;
    const eCtx = exp.getContext("2d");
    eCtx.drawImage(originalImage,0,0);
    if(maskPath){
        const val=document.getElementById("fabricSelect").value;
        const rgb=val.split(",");
        eCtx.save(); eCtx.clip(maskPath); eCtx.globalCompositeOperation="multiply";
        eCtx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        eCtx.fillRect(0,0,exp.width,exp.height); eCtx.restore();
    }
    const url=exp.toDataURL("image/png");
    const area=document.getElementById("saveArea"); area.innerHTML="";
    const img=document.createElement("img"); img.src=url; img.style.width="95%";
    area.appendChild(img);
    alert("画像を作成しました。下に出ている画像を長押しして保存してください。");
}
</script>
</body>
</html>
