<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Tent Simulator AI</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    margin: 0;
    padding: 10px;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}
canvas {
    border: 1px solid #aaa;
    max-width: 95%;
    touch-action: none;
    cursor: crosshair;
    background-color: #f0f0f0;
    -webkit-touch-callout: none;
}
button {
    margin: 5px;
    padding: 10px 15px;
    font-size: 14px;
    border-radius: 5px;
    border: 1px solid #ccc;
    background: #fff;
}
#status {
    color: #666;
    font-size: 0.8em;
    margin-bottom: 10px;
    min-height: 1.2em;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
</head>
<body>

<h2>テント張替えシミュレーター AI</h2>
<div id="status">AIエンジン起動中...</div>

<input type="file" id="upload" accept="image/*"><br><br>

<select id="fabricSelect">
    <option>生地読み込み中...</option>
</select>

<br><br>
<button onclick="undoPoint()">1点戻す</button>
<button onclick="clearPolygon()">リセット</button>
<button onclick="finishPolygon()">囲み完了</button>
<button onclick="saveImage()">画像保存</button>

<br><br>
<canvas id="canvas"></canvas>
<div id="saveArea"></div>

<script>
/* =========================
   AI設定 (修正版)
========================= */
let interactiveSegmenter;
const statusDiv = document.getElementById("status");

async function initAI() {
    try {
        // グローバルオブジェクトからの取得を確実にする
        const vision = await Array.from(document.scripts)
            .find(s => s.src.includes('tasks-vision'))
            ? window.tasksVision : null;
            
        if (!vision) {
            // 直接参照を試みる
            const filesetResolver = await transitions.FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
        }

        // 最も確実なグローバル参照方法
        const filesetResolver = await tflite_model_runner_FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        
        // 以下の書き方で再試行
        const { InteractiveSegmenter, FilesetResolver } = mediapipe.tasksVision;
        const wasmFileset = await FilesetResolver.forVisionTasks(
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );

        interactiveSegmenter = await InteractiveSegmenter.createFromOptions(wasmFileset, {
            baseOptions: {
                modelAssetPath: `https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/models/interactive_segmenter.tflite`,
                delegate: "GPU"
            },
            outputCategoryMask: true,
            outputConfidenceMasks: false
        });
        statusDiv.textContent = "AI準備完了：テントをタップして自動抽出";
    } catch (e) {
        // エラー詳細を表示して原因を特定しやすくする
        statusDiv.innerHTML = `<span style='color:red;'>⚠️ 起動失敗: ${e.message}</span>`;
        console.error(e);
    }
}
initAI();

/* =========================
   以下、既存のCanvas/操作ロジック (変更なし)
========================= */
const csvURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQyMy5PUSJjr1f_fnQIpRIUagAp8Dw7Hqckr9422w_459qgQ_j4Bhw4LWygLVWTURa9n4Xl_gBNHAie/pub?output=csv";
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let originalImage = null, points = [], maskPath = null;
let scale = 1, offsetX = 0, offsetY = 0, pointers = [];
let lastDistance = 0, lastPanX = 0, lastPanY = 0, moved = false, pinchUsed = false;
let needsRedraw = true;

function renderLoop() { if (needsRedraw) { draw(); needsRedraw = false; } requestAnimationFrame(renderLoop); }
requestAnimationFrame(renderLoop);

fetch(csvURL).then(res => res.text()).then(text => {
    const rows = text.trim().split("\n").slice(1);
    const select = document.getElementById("fabricSelect");
    select.innerHTML = "";
    rows.forEach(row => {
        const cols = row.split(",");
        const option = document.createElement("option");
        option.textContent = `${cols[0]} ${cols[1]} ${cols[2]} ${cols[3]}`;
        option.value = (cols[4] && cols[5] && cols[6]) ? `${cols[4]},${cols[5]},${cols[6]}` : "";
        select.appendChild(option);
    });
});

document.getElementById("upload").onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const img = new Image();
    img.onload = () => {
        canvas.width = img.width; canvas.height = img.height;
        scale = 1; offsetX = 0; offsetY = 0;
        originalImage = img; points = []; maskPath = null;
        needsRedraw = true;
    };
    img.src = URL.createObjectURL(file);
};

function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    return { x: (x - offsetX) / scale, y: (y - offsetY) / scale };
}

async function runAISegmentation(x, y) {
    if (!interactiveSegmenter || !originalImage) return;
    statusDiv.textContent = "解析中...";
    points = []; maskPath = null;
    const result = interactiveSegmenter.segment(originalImage, {
        keypoint: { x: x / canvas.width, y: y / canvas.height }
    });
    const mask = result.categoryMask.getAsUint8Array();
    processMask(mask);
}

function processMask(maskData) {
    const mCanvas = document.createElement("canvas");
    mCanvas.width = canvas.width; mCanvas.height = canvas.height;
    const mCtx = mCanvas.getContext("2d");
    const mImgData = mCtx.createImageData(canvas.width, canvas.height);
    let hit = false;
    for (let i = 0; i < maskData.length; i++) {
        if (maskData[i] > 0) { mImgData.data[i * 4] = 255; mImgData.data[i * 4 + 3] = 255; hit = true; }
    }
    mCtx.putImageData(mImgData, 0, 0);
    if(hit) { maskPath = new Path2D(mCanvas); statusDiv.textContent = "抽出完了"; }
    else { statusDiv.textContent = "範囲が見つかりませんでした"; }
    needsRedraw = true;
}

canvas.addEventListener("pointerdown", e => {
    if(e.pointerType === 'touch') e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    pointers.push(e);
    lastPanX = e.clientX; lastPanY = e.clientY;
    moved = false; pinchUsed = false;
});

canvas.addEventListener("pointermove", e => {
    for(let i=0; i<pointers.length; i++){ if(pointers[i].pointerId === e.pointerId) pointers[i] = e; }
    if(pointers.length === 2) {
        pinchUsed = true;
        const p1 = pointers[0], p2 = pointers[1];
        const rect = canvas.getBoundingClientRect();
        const centerX = (p1.clientX + p2.clientX) / 2;
        const centerY = (p1.clientY + p2.clientY) / 2;
        const canvasX = (centerX - rect.left) * (canvas.width / rect.width);
        const canvasY = (centerY - rect.top) * (canvas.height / rect.height);
        const distance = Math.sqrt(Math.pow(p1.clientX - p2.clientX, 2) + Math.pow(p1.clientY - p2.clientY, 2));
        if(lastDistance) {
            const zoom = distance / lastDistance;
            offsetX = canvasX - (canvasX - offsetX) * zoom;
            offsetY = canvasY - (canvasY - offsetY) * zoom;
            scale *= zoom; needsRedraw = true;
        }
        lastDistance = distance;
    } else if(pointers.length === 1) {
        const dx = e.clientX - lastPanX, dy = e.clientY - lastPanY;
        offsetX += dx; offsetY += dy;
        if(Math.abs(dx) > 5 || Math.abs(dy) > 5) moved = true;
        lastPanX = e.clientX; lastPanY = e.clientY;
        needsRedraw = true;
    }
});

canvas.addEventListener("pointerup", e => {
    pointers = pointers.filter(p => p.pointerId !== e.pointerId);
    lastDistance = 0;
    if(!moved && !pinchUsed) {
        const pos = getMousePos(e);
        if(interactiveSegmenter) runAISegmentation(pos.x, pos.y);
        else points.push(pos);
        needsRedraw = true;
    }
});

function draw() {
    ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.setTransform(scale, 0, 0, scale, offsetX, offsetY);
    if(originalImage) ctx.drawImage(originalImage, 0, 0);
    if(maskPath) { applyFabric(); }
    else if(points.length > 0) {
        ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
        for(let i=1; i<points.length; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.strokeStyle = "red"; ctx.lineWidth = 3/scale; ctx.stroke();
    }
}

function applyFabric() {
    const val = document.getElementById("fabricSelect").value;
    if(!val || !maskPath) return;
    const rgb = val.split(",");
    ctx.save(); ctx.clip(maskPath); ctx.globalCompositeOperation = "multiply";
    ctx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.restore();
}

function finishPolygon() {
    if(points.length < 3) return;
    maskPath=new Path2D(); maskPath.moveTo(points[0].x, points[0].y);
    for(let i=1; i<points.length; i++) maskPath.lineTo(points[i].x, points[i].y);
    maskPath.closePath(); points = []; needsRedraw = true;
}

document.getElementById("fabricSelect").onchange = () => { needsRedraw = true; };
function undoPoint() { points.pop(); needsRedraw = true; }
function clearPolygon() { points = []; maskPath = null; statusDiv.textContent = "AI準備完了"; needsRedraw = true; }

function saveImage() {
    if(!originalImage) return;
    const out = document.createElement("canvas");
    out.width = canvas.width; out.height = canvas.height;
    const octx = out.getContext("2d");
    octx.drawImage(originalImage, 0, 0);
    if(maskPath) {
        const rgb = document.getElementById("fabricSelect").value.split(",");
        octx.save(); octx.clip(maskPath); octx.globalCompositeOperation = "multiply";
        octx.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
        octx.fillRect(0, 0, out.width, out.height); octx.restore();
    }
    const url = out.toDataURL("image/png");
    const area = document.getElementById("saveArea");
    area.innerHTML = "<h4>↓ 長押しして保存</h4>";
    const img = new Image(); img.src = url; img.style.width = "95%";
    area.appendChild(img);
}
</script>
</body>
</html>
